---
name: Container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Semver image version without a leading v
        required: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  image:
    name: Build image
    uses: abhi1693/actions/.github/workflows/docker-build-push.yml@master
    with:
      runs-on: ubuntu-24.04-arm
      image: ghcr.io/abhi1693/qbittorrent-smart-queues
      context: .
      file: Dockerfile
      platforms: linux/arm64
      cache-scope: qbittorrent-smart-queues
      push: ${{ github.event_name != 'pull_request' }}
      tags: |
        type=semver,pattern={{version}}
        type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
      labels: |
        org.opencontainers.image.source=https://github.com/abhi1693/qbittorrent-smart-queues
        org.opencontainers.image.title=qbittorrent-smart-queues
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
